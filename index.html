<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FLASH HIGH LOGIN</title>

<style>
  body{
    font-family: Arial, sans-serif;
    background:#0b1220;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
  }

  .box{
    background:#111a2e;
    padding:30px;
    border-radius:15px;
    width:320px;
    text-align:center;
    border:1px solid #223;
  }

  input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border-radius:8px;
    border:none;
    outline:none;
  }

  button{
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#3b82f6;
    color:white;
    cursor:pointer;
    margin-top:10px;
  }

  button:disabled{
    opacity:0.6;
  }

  .msg{
    margin-top:10px;
    font-size:0.9rem;
    color:#ff6b6b;
  }

  /* MODAL */
  #code-ov{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.85);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:999;
  }

  #code-box{
    background:#111a2e;
    padding:25px;
    border-radius:15px;
    width:300px;
    text-align:center;
    border:1px solid #223;
  }

  #code-input{
    font-size:20px;
    text-align:center;
    letter-spacing:8px;
  }
</style>
</head>

<body>

<div class="box">
  <h2>LOGIN</h2>

  <input id="login-correo" placeholder="Correo"/>
  <input id="login-cedula" placeholder="Cédula"/>

  <button id="btn-login" onclick="doLogin()">Ingresar</button>

  <div class="msg" id="login-msg"></div>
</div>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbymI9DRdt-KKSBuwbHt-1sch5nIk97Q2lugQK05Rv8A8plcQqfABmkIFWryvQ7mTL5FcQ/exec";

// ─────────────────────────────
// UTIL
// ─────────────────────────────
function showMsg(el, text){
  el.textContent = text;
}

// ─────────────────────────────
// LOGIN
// ─────────────────────────────
async function doLogin(){
  const correo = document.getElementById("login-correo").value.trim().toLowerCase();
  const cedula = document.getElementById("login-cedula").value.trim();
  const msg = document.getElementById("login-msg");
  const btn = document.getElementById("btn-login");

  if(!correo || !cedula){
    return showMsg(msg, "Completa los datos");
  }

  btn.disabled = true;
  btn.textContent = "Verificando...";

  try{
    const res = await fetch(APPS_SCRIPT_URL + `?action=login&correo=${correo}&cedula=${cedula}`);
    const data = await res.json();

    if(!data.ok){
      showMsg(msg, "Credenciales incorrectas");
      btn.disabled = false;
      btn.textContent = "Ingresar";
      return;
    }

    // 🔐 BLOQUEO POR CÓDIGO
    const ok = await showCodeModal();
    if(!ok){
      btn.disabled = false;
      btn.textContent = "Ingresar";
      return;
    }

    enterDashboard(data.employee);

  }catch(e){
    showMsg(msg, "Error de conexión");
    btn.disabled = false;
    btn.textContent = "Ingresar";
  }
}

// ─────────────────────────────
// MODAL CÓDIGO
// ─────────────────────────────
function showCodeModal(){
  return new Promise(resolve => {

    const ov = document.createElement("div");
    ov.id = "code-ov";

    ov.innerHTML = `
      <div id="code-box">
        <h3>🔐 Código de acceso</h3>
        <p style="font-size:12px;opacity:0.7">Solicítalo al supervisor</p>

        <input id="code-input" maxlength="5" placeholder="•••••"/>

        <div id="timer" style="margin-top:10px;color:#3b82f6">60s</div>

        <button onclick="verifyCode()">Validar</button>

        <div id="code-msg" style="margin-top:10px;font-size:12px;color:#ff6b6b"></div>
      </div>
    `;

    document.body.appendChild(ov);

    let time = 60;
    const timer = ov.querySelector("#timer");

    const interval = setInterval(()=>{
      time--;
      timer.textContent = time + "s";
      if(time <= 0) time = 60;
    },1000);

    window.verifyCode = async function(){

      const code = document.getElementById("code-input").value.trim();
      const msg = document.getElementById("code-msg");

      if(code.length !== 5){
        msg.textContent = "Código inválido";
        return;
      }

      try{
        const res = await fetch(APPS_SCRIPT_URL + `?action=validateCode&code=${code}`);
        const data = await res.json();

        if(data.ok && data.valid){
          clearInterval(interval);
          ov.remove();
          resolve(true);
        }else{
          msg.textContent = "Código incorrecto";
        }

      }catch(e){
        msg.textContent = "Error validando";
      }
    };
  });
}

// ─────────────────────────────
// DASHBOARD (placeholder)
// ─────────────────────────────
function enterDashboard(user){
  document.body.innerHTML = `
    <div style="text-align:center">
      <h1>Bienvenido ${user.name}</h1>
      <p>Acceso autorizado ✔</p>
    </div>
  `;
}
</script>

</body>
</html>
