<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Flash High — Control de Asistencia</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
--bg:#05080f;--surface:#0c1118;--surface2:#111720;--surface3:#161e2a;
--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
--accent:#00d4ff;--accent2:#6c4ff0;--success:#00e676;
--warning:#ffab00;--danger:#ff4d6d;--text:#e4e8f0;
--muted:#56617a;--muted2:#3a4255;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);}
</style>
</head>

<body>

<header>
<div>Flash High</div>
</header>

<main>

<!-- LOGIN -->
<div id="view-auth">
<input id="login-correo" placeholder="correo" />
<input id="login-cedula" placeholder="cedula" />
<button onclick="doLogin()">Ingresar</button>
</div>

<!-- DASHBOARD -->
<div id="view-dashboard" style="display:none;">
<h2>Dashboard</h2>
</div>

</main>

<!-- CONFIG -->
<script>
const SUPABASE_URL = 'https://itdppxijisjaaxwshnym.supabase.co';
const SUPABASE_KEY = 'sb_publishable_kP2vtxKS7W-7peFZJKfx3g_Q_AOeyBN';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxulk3DlpsRbKobuHMM8EViC-pEYdoJFC-acV4KvIIhR9QqWJ30jEl7S7yXJsAzvN2NBQ/exec';
</script>

<script>
let currentUser = null;

/* ═══════════════════════════════════════
🔐 AUTENTICADOR 5 DÍGITOS (NUEVO)
═══════════════════════════════════════ */

const AUTH_CODE_STATE = {
  code: '',
  lastUpdate: 0
};

async function fetchAuthCode() {
  try {
    const res = await fetch(`${APPS_SCRIPT_URL}?action=getCode`);
    const data = await res.json();

    if (data?.ok) {
      AUTH_CODE_STATE.code = String(data.code || '')
        .replace(/\D/g,'')   // solo números
        .slice(0,5);         // SOLO 5 DIGITOS

      AUTH_CODE_STATE.lastUpdate = Date.now();

      console.log('🔐 Código actualizado:', AUTH_CODE_STATE.code);
    }
  } catch (e) {
    console.warn('Error código auth:', e.message);
  }
}

// actualizar cada 30 segundos
setInterval(fetchAuthCode, 30000);
fetchAuthCode();

/* ═══════════════════════════════════════ */

async function doLogin(){
  const correo = document.getElementById('login-correo').value;
  const cedula = document.getElementById('login-cedula').value;

  const { data } = await sb
    .from('employees')
    .select('*')
    .eq('correo', correo)
    .eq('cedula', cedula)
    .single();

  if(data){
    currentUser = data;
    document.getElementById('view-auth').style.display='none';
    document.getElementById('view-dashboard').style.display='block';
  }
}

/* ═══════════════════════════════════════
SYNC A SHEETS (MODIFICADO)
═══════════════════════════════════════ */

async function syncToSheets(data) {
  try {
    const params = new URLSearchParams({
      action: 'writeLog',

      // 🔐 NUEVO
      code: AUTH_CODE_STATE.code,

      ...data
    });

    const url = `${APPS_SCRIPT_URL}?${params.toString()}`;
    const res = await fetch(url);
    const json = await res.json();

    if (!json.ok) console.warn(json.error);
  } catch(e){
    console.warn('sync error:', e.message);
  }
}

</script>

</body>
</html>
